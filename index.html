<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Spese</title>

  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar navbar-dark px-4">
  <div class="d-flex align-items-center gap-2">
    <div style="width:40px; height:40px;">
      <img src="img/logo.png" alt="Logo" style="width:100%; height:100%;">
    </div>
    <span class="navbar-brand mb-0 h5">Expense Dashboard</span>
  </div>
  <div class="ms-auto text-white">Dashboard</div>
</header>

<main>
  <div class="container py-4" style="max-width:1100px;">

    <!-- TITLE -->
    <div class="mb-4 text-center">
      <h2 class="dashboard-title">Dashboard Spese Personali</h2>
      <p class="dashboard-subtitle">Gestisci e monitora le tue spese</p>
    </div>

    <!-- FORM -->
    <section class="mb-4">
      <div class="card p-3">
        <h5 class="mb-3">Aggiungi spesa</h5>

        <form id="expense-form">
          <div class="row g-3">

            <div class="col-md-4">
              <input type="text" id="description" class="form-control" placeholder="Descrizione" required>
            </div>

            <div class="col-md-2">
              <input type="text" id="amount" class="form-control" placeholder="Importo" required>
            </div>

            <div class="col-md-2">
              <select id="category" class="form-select" required>
                <option value="">Categoria</option>
                <option>Casa</option>
                <option>Cibo</option>
                <option>Trasporti</option>
                <option>Tempo libero</option>
                <option>Salute</option>
                <option>Altro</option>
              </select>
            </div>

            <div class="col-md-2">
              <input type="date" id="date" class="form-control" required>
            </div>

            <div class="col-md-2">
              <button type="submit" class="btn btn-primary w-100">Aggiungi</button>
            </div>

          </div>
        </form>
      </div>
    </section>

    <!-- SUMMARY -->
    <section class="mb-4">
      <div class="row">
        <div class="col-md-6">
          <div class="card p-3 text-center">
            <h6>Totale Spese</h6>
            <h3 id="total-amount" class="value-primary">€0</h3>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card p-3 text-center">
            <h6>Numero Spese</h6>
            <h3 id="total-count" class="value-primary">0</h3>
          </div>
        </div>
      </div>
    </section>

    <!-- FILTERS -->
    <section class="mb-4">
      <div class="card p-3">
        <div class="row g-3">

          <div class="col-md-4">
            <input type="text" id="search" class="form-control" placeholder="Cerca per descrizione">
          </div>

          <div class="col-md-4">
            <select id="filter-category" class="form-select">
              <option value="">Tutte le categorie</option>
              <option>Casa</option>
              <option>Cibo</option>
              <option>Trasporti</option>
              <option>Tempo libero</option>
              <option>Salute</option>
              <option>Altro</option>
            </select>
          </div>

          <div class="col-md-4">
            <select id="sort" class="form-select">
              <option value="">Ordina</option>
              <option value="amount">Importo</option>
              <option value="date">Data</option>
            </select>
          </div>

        </div>
      </div>
    </section>

    <!-- TABLE -->
    <section>
      <div class="card p-3">
        <h5 class="mb-3">Lista Spese</h5>

        <table class="table">
          <thead>
            <tr>
              <th>Descrizione</th>
              <th>Importo</th>
              <th>Categoria</th>
              <th>Data</th>
              <th>Azioni</th>
            </tr>
          </thead>
          <tbody id="expense-list"></tbody>
        </table>
      </div>
    </section>

  </div>
</main>

<!-- MODALS -->
<div class="modal fade" id="feedbackModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header" id="modalHeader">
        <h5 id="modalTitle"></h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">OK</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="editModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Modifica spesa</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input id="edit-description" class="form-control mb-2">
        <input id="edit-amount" class="form-control mb-2">
        <select id="edit-category" class="form-select mb-2">
          <option>Casa</option>
          <option>Cibo</option>
          <option>Trasporti</option>
          <option>Tempo libero</option>
          <option>Salute</option>
          <option>Altro</option>
        </select>
        <input type="date" id="edit-date" class="form-control">
      </div>

      <div class="modal-footer">
        <button class="btn btn-primary" onclick="saveEdit()">Salva</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
